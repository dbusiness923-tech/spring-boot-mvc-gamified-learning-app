<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .leaderboard-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .highlight {
            background-color: #fffacd;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
<div class="leaderboard-container">
    <h1>Leaderboard</h1>

    <div>
        <p>Your Level: <span th:text="${level}"></span></p>
        <p>Your XP: <span th:text="${xp}"></span></p>
    </div>

    <table>
        <thead>
        <tr>
            <th>Rank</th>
            <th>Username</th>
            <th>Level</th>
            <th>XP</th>
            <th>Puzzles Completed</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user, iterStat : ${leaderboard}"
            th:class="${user.username == currentUser.username} ? 'highlight'">
            <td th:text="${iterStat.count}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.level}"></td>
            <td th:text="${user.xp}"></td>
            <td th:text="${completedCounts.get(user.id)}"></td>
        </tr>
        </tbody>
    </table>

    <a href="/welcome" class="btn">Return to Dashboard</a>
</div>
</body>
</html>
