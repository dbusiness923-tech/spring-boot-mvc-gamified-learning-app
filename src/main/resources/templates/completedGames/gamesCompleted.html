<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completed Games</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        /* Progress Container */
        .progress-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        /* Button Styles */
        a.btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        a.btn:hover {
            background: #0056b3;
        }

        .xp-box {

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 20px;
            right: 20px;
            height: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            width: 15%;
            text-align: center;
            z-index:9999;
        }

        .xp-box p {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
<h1>Completed Games</h1>
<div class="progress-container">
    <!-- Completed Puzzles -->
    <h2>Your Completed Puzzles</h2>
    <table>
        <thead>
        <tr>
            <th>Puzzle</th>
            <th>Difficulty</th>
            <th>Completion Time</th>
            <th>Date Completed</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="progress : ${completedGames}">
            <td th:text="${progress.puzzle.question}"></td>
            <td th:text="${progress.puzzle.difficulty}"></td>
            <td th:text="${progress.completionTimeInSeconds} + ' seconds'"></td>
            <td th:text="${#temporals.format(progress.endTime, 'dd/MM/yyyy HH:mm')}"></td>
        </tr>
        </tbody>
    </table>

    <!-- Back to Dashboard -->
    <a href="/welcome" class="btn">Return to Dashboard</a>
</div>

<div class="xp-box">
    <p>🔥 Level: <span th:text="${level} ?: 'N/A'"></span></p>
    <p>
        ⭐ XP: <span th:text="${xp + '/150'} ?: 'N/A'"></span>
    </p>
</div>
</body>
</html>
