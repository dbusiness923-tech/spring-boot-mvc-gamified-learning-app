<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Profile</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Profile Container */
        .profile-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        /* Heading */
        h2 {
            margin-bottom: 1.5rem;
            color: #333;
            font-size: 2rem;
        }

        /* Success Message */
        .success-message {
            color: green;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        /* Profile Details */
        p {
            color: #333;
            font-size: 1rem;
            margin: 0.5rem 0;
        }

        /* Links as Buttons */
        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .xp-box {

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 20px;
            right: 20px;
            height: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            width: 15%;
            text-align: center;
            z-index:9999;
        }

        .xp-box p {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="profile-container">
    <h2>Profile Details</h2>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="success-message">
        <p th:text="${successMessage}"></p>
    </div>

    <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
    <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
    <p><strong>Username:</strong> <span th:text="${user.username}"></span></p>
    <p><strong>Country:</strong> <span th:text="${user.country}"></span></p>

    <a href="/edit" class="btn">Edit Profile</a>
    <a href="/welcome" class="btn">Return to Dashboard</a>
</div>

<div class="xp-box">
    <p>🔥 Level: <span th:text="${level} ?: 'N/A'"></span></p>
    <p>
        ⭐ XP: <span th:text="${xp + '/150'} ?: 'N/A'"></span>
    </p>
</div>

</body>
</html>
