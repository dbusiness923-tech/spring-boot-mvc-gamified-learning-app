<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Puzzle Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        /* Result Box */
        .result-box {
            background: #fff;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* Button Styling */
        a.btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        a.btn:hover {
            background: #0056b3;
        }

        .btn.disabled {
            background: gray !important;
            pointer-events: none;
            cursor: not-allowed;
        }

        .locked-message {
            color: #ff0000;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .unlocked-message {
            color: #00aa00;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .xp-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 20px;
            right: 20px;
            height: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            width: 15%;
            text-align: center;
            z-index:9999;
        }

        .xp-box p {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="result-box">
    <h1>Answer Result</h1>

    <!-- Display the result message -->
    <p th:text="'Your answer is: ' + (${isCorrect} ? 'Correct' : 'Incorrect')"></p>

    <!-- Display the puzzle question -->
    <p th:text="'Puzzle: ' + ${puzzle.question}"></p>

    <!-- Button to try another easy puzzle -->
    <a href="/puzzles/easy" class="btn">Try another easy puzzle</a>
    <p class="unlocked-message">Available to all players</p>

    <!-- Button to try another medium puzzle -->
    <br>
    <a href="/puzzles/medium" class="btn">Try another medium puzzle</a>
    <p class="unlocked-message">Requires Level 2</p>

    <!-- Button to try a hard puzzle -->
    <br>
    <a href="/puzzles/hard" id="hard-btn" class="btn disabled">Try a hard puzzle</a>
    <p class="locked-message" id="hard-lock">Requires Level 3</p>

    <!-- Button to return to puzzles -->
    <br>
    <a href="/box2" class="btn">Return to Puzzles</a>
</div>

<div class="xp-box">
    <p>🔥 Level: <span id="player-level" th:text="${level} ?: '1'"></span></p>
    <p>⭐ XP: <span th:text="${xp + '/150'} ?: '0/150'"></span></p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        updatePuzzleLocks();
    });

    function updatePuzzleLocks() {
        // Get player level from the page (using Thymeleaf value or default to 1)
        const playerLevel = parseInt(document.getElementById('player-level').textContent) || 1;

        // Unlock hard puzzles at level 3
        if (playerLevel >= 3) {
            document.getElementById("hard-btn").classList.remove("disabled");
            document.getElementById("hard-lock").textContent = "Unlocked!";
            document.getElementById("hard-lock").className = "unlocked-message";
        }
    }
</script>
</body>
</html>
