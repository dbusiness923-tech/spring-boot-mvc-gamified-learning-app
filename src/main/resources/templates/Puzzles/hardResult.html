<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hard Puzzle Result</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #e0e0e0;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        /* Result Box */
        .result-box {
            background: #fff;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* Button Styling */
        a.btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        a.btn:hover {
            background: #0056b3;
        }

        .xp-box {

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 20px;
            right: 20px;
            height: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            width: 15%;
            text-align: center;
            z-index:9999;
        }

        .xp-box p {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="result-box">
    <h1>Answer Result</h1>

    <!-- Display the result message -->
    <p th:text="'Your answer is: ' + (${isCorrect} ? 'Correct' : 'Incorrect')"></p>

    <!-- Display the puzzle question -->
    <p th:text="'Puzzle: ' + ${puzzle.question}"></p>

    <!-- Button to try another hard puzzle -->
    <a href="/puzzles/hard" class="btn">Try another hard puzzle</a>

    <!-- Button to try a medium puzzle -->
    <br>
    <a href="/puzzles/medium" class="btn">Try a medium puzzle</a>

    <!-- Button to try an easy puzzle -->
    <br>
    <a href="/puzzles/easy" class="btn">Try an easy puzzle</a>

    <!-- Button to return to puzzles -->
    <br>
    <a href="/box2" class="btn">Return to Puzzles</a>
</div>

<div class="xp-box">
    <p>🔥 Level: <span th:text="${level} ?: 'N/A'"></span></p>
    <p>
        ⭐ XP: <span th:text="${xp + '/150'} ?: 'N/A'"></span>
    </p>
</div>

</body>
</html>
