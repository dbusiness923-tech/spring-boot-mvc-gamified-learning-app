<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzles Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e0e0e0;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #333;
    }

    /* Card Styles */
    .puzzle-box {
      background: white;
      max-width: 400px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .puzzle-box:hover {
      transform: translateY(-5px);
      box-shadow: 4px 4px 15px rgba(0,0,0,0.3);
    }

    h2 {
      color: #333;
    }

    /* Button Styling */
    a.btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s ease;
    }

    a.btn:hover {
      background: #0056b3;
    }

    .btn.disabled {
      background: gray !important;
      pointer-events: none;
      cursor: not-allowed;
    }

    .locked-message {
      color: #ff0000;
      font-size: 0.9em;
      margin-top: 5px;
    }

    .xp-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: fixed;
      top: 20px;
      right: 20px;
      height: 30px;
      background-color: white;
      padding: 20px;
      border-radius: 40px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
      width: 15%;
      text-align: center;
      z-index:9999;
    }

    .xp-box p {
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
<h1>Puzzles</h1>
<h3>Reach higher levels to unlock more difficult puzzles!</h3>

<div class="puzzle-box">
  <h2>Easy Puzzles</h2>
  <p class="locked-message">Available to all players</p>
  <a href="/puzzles/easy" class="btn">PLAY!</a>
</div>

<div class="puzzle-box">
  <h2>Medium Puzzles</h2>
  <p class="locked-message" id="medium-lock">Requires Level 2</p>
  <a href="/puzzles/medium" id="medium-btn" class="btn disabled">PLAY!</a>
</div>

<div class="puzzle-box">
  <h2>Hard Puzzles</h2>
  <p class="locked-message" id="hard-lock">Requires Level 3</p>
  <a href="/puzzles/hard" id="hard-btn" class="btn disabled">PLAY!</a>
</div>

<a th:href="@{/resume}" class="btn">Resume Your Puzzles</a>
<a href="/welcome" class="btn">Return to Dashboard</a>

<div class="xp-box">
  <p>🔥 Level: <span id="player-level" th:text="${level} ?: '1'"></span></p>
  <p>⭐ XP: <span th:text="${xp + '/150'} ?: '0/150'"></span></p>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    updatePuzzleLocks();
  });

  function updatePuzzleLocks() {
    // Get player level from the page (using Thymeleaf value or default to 1)
    const playerLevel = parseInt(document.getElementById('player-level').textContent) || 1;

    // Unlock medium puzzles at level 2
    if (playerLevel >= 2) {
      document.getElementById("medium-btn").classList.remove("disabled");
      document.getElementById("medium-lock").textContent = "Unlocked!";
      document.getElementById("medium-lock").style.color = "#00aa00";
    }

    // Unlock hard puzzles at level 3
    if (playerLevel >= 3) {
      document.getElementById("hard-btn").classList.remove("disabled");
      document.getElementById("hard-lock").textContent = "Unlocked!";
      document.getElementById("hard-lock").style.color = "#00aa00";
    }
  }
</script>
</body>
</html>
