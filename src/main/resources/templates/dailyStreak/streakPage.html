<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daily Streak</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 30px;
        }

        .streak-card {
            background-color: #081c3a;
            color: white;
            padding: 40px;
            margin: auto;
            width: 300px;
            border-radius: 20px;
            box-shadow: 2px 4px 12px rgba(0, 0, 0, 0.2);
        }

        .streak-card h1 {
            font-size: 60px;
            margin: 10px 0;
        }

        .streak-card .lightning {
            font-size: 50px;
            color: #ffcc00;
        }

        .days {
            margin-top: 15px;
            display: flex;
            justify-content: space-around;
            color: #ccc;
        }

        .days span.active {
            color: #00ffcc;
            font-weight: bold;
        }

        .status {
            margin-top: 20px;
            font-size: 1.2rem;
        }

        .claim-btn {
            background-color: #00d084;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            margin-top: 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .claim-btn:hover {
            background-color: #00a76f;
        }

        .go-to-welcome-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            margin-top: 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .go-to-welcome-btn:hover {
            background-color: #0056b3;
        }

        .message {
            margin-top: 20px;
            color: #ffde59;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="streak-card">
    <div class="lightning">⚡</div>
    <h1 th:text="${streakCount}">1</h1>

    <div class="days">
        <span>M</span><span>T</span><span>W</span><span class="active">T</span><span>F</span><span>S</span><span>S</span>
    </div>

    <div class="status">Streak mode: <strong>Activated ⚡</strong></div>

    <form action="/claim-xp" method="post" th:if="${!hasClaimed}">
        <button class="claim-btn" type="submit">Claim XP</button>
    </form>

    <div class="message" th:if="${message}" th:text="${message}"></div>

    <!-- Go to Welcome button -->
    <form action="/welcome" method="get">
        <button class="go-to-welcome-btn" type="submit">Go to Welcome Page</button>
    </form>
</div>

</body>
</html>
