<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Achievements</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e0e0e0;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: #fff;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
        .achievement {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            margin: 10px 0;
            border-bottom: 1px solid #ccc;
            font-size: 1.1rem;
        }
        .status {
            font-weight: bold;
            color: green;
        }
        .not-completed {
            font-weight: bold;
            color: #888;
        }
        a.button {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        a.button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Achievements</h1>

    <div class="achievement">
        <span>Complete Easy Level</span>
        <span th:if="${user.easyCompleted}" class="status">COMPLETED</span>
        <span th:unless="${user.easyCompleted}" class="not-completed">X</span>
    </div>

    <div class="achievement">
        <span>Complete Medium Level</span>
        <span th:if="${user.mediumCompleted}" class="status">COMPLETED</span>
        <span th:unless="${user.mediumCompleted}" class="not-completed">X</span>
    </div>

    <div class="achievement">
        <span>Complete Hard Level</span>
        <span th:if="${user.hardCompleted}" class="status">COMPLETED</span>
        <span th:unless="${user.hardCompleted}" class="not-completed">X</span>
    </div>

    <a class="button" href="/welcome">Back to Dashboard</a>
</div>
</body>
</html>
